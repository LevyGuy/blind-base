<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
    <title>BlindBase POC</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #f5f5f5;
            color: #333;
        }

        h2 {
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }

        .hidden {
            display: none;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.25rem;
            color: #444;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4a90d9;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'Monaco', 'Menlo', monospace;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #4a90d9;
        }

        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: #4a90d9;
            color: white;
        }

        .btn-primary:hover {
            background: #3a7bc8;
        }

        .btn-primary:disabled {
            background: #a0c4e8;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            margin-left: 0.5rem;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            margin-left: 0.5rem;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .status {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .status--info {
            background: #e3f2fd;
            color: #1565c0;
        }

        .status--success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status--error {
            background: #ffebee;
            color: #c62828;
        }

        .status--warning {
            background: #fff3e0;
            color: #e65100;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 3px solid #4a90d9;
            padding: 0.75rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #666;
        }

        .user-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1565c0;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .actions {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h2>BlindBase POC</h2>
    <p class="subtitle">Zero-knowledge encrypted storage</p>

    <!-- Login Screen -->
    <div id="login-screen" class="card">
        <p>Enter your credentials to unlock your encrypted vault.</p>

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username (lowercase, 3-32 chars)" autocomplete="username">

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your secret password" autocomplete="current-password">

        <button id="login-btn" class="btn-primary">
            <span id="login-text">Unlock Vault</span>
            <span id="login-loading" class="hidden"><span class="spinner"></span>Unlocking...</span>
        </button>

        <div class="info-box">
            <strong>Privacy Notice:</strong> Your password never leaves your device.
            It is used to derive an encryption key locally. If you forget your password,
            your data cannot be recovered.
        </div>
    </div>

    <!-- Vault Screen -->
    <div id="vault-screen" class="card hidden">
        <div class="user-badge" id="user-badge">Logged in as: -</div>

        <label for="secret-data">Your Encrypted Data</label>
        <textarea id="secret-data" placeholder="Type your secret data here..."></textarea>

        <div class="actions">
            <button id="save-btn" class="btn-primary">
                <span id="save-text">Save</span>
                <span id="save-loading" class="hidden"><span class="spinner"></span>Saving...</span>
            </button>
            <button id="reload-btn" class="btn-secondary">Reload</button>
            <button id="logout-btn" class="btn-danger">Logout</button>
        </div>
    </div>

    <!-- Status Display -->
    <div id="status" class="hidden"></div>

    <!-- Load BlindBase SDK and UI logic (external scripts only; strict CSP) -->
    <script src="js/blindbase-client.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
