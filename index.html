<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
    <title>BlindBase POC</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #f5f5f5;
            color: #333;
        }

        h2 {
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }

        .hidden {
            display: none;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.25rem;
            color: #444;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4a90d9;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'Monaco', 'Menlo', monospace;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #4a90d9;
        }

        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: #4a90d9;
            color: white;
        }

        .btn-primary:hover {
            background: #3a7bc8;
        }

        .btn-primary:disabled {
            background: #a0c4e8;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            margin-left: 0.5rem;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            margin-left: 0.5rem;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .status {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .status--info {
            background: #e3f2fd;
            color: #1565c0;
        }

        .status--success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status--error {
            background: #ffebee;
            color: #c62828;
        }

        .status--warning {
            background: #fff3e0;
            color: #e65100;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 3px solid #4a90d9;
            padding: 0.75rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #666;
        }

        .user-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1565c0;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .actions {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h2>BlindBase POC</h2>
    <p class="subtitle">Zero-knowledge encrypted storage</p>

    <!-- Login Screen -->
    <div id="login-screen" class="card">
        <p>Enter your credentials to unlock your encrypted vault.</p>

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username (lowercase, 3-32 chars)" autocomplete="username">

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your secret password" autocomplete="current-password">

        <button id="login-btn" class="btn-primary" onclick="handleLogin()">
            <span id="login-text">Unlock Vault</span>
            <span id="login-loading" class="hidden"><span class="spinner"></span>Unlocking...</span>
        </button>

        <div class="info-box">
            <strong>Privacy Notice:</strong> Your password never leaves your device.
            It is used to derive an encryption key locally. If you forget your password,
            your data cannot be recovered.
        </div>
    </div>

    <!-- Vault Screen -->
    <div id="vault-screen" class="card hidden">
        <div class="user-badge" id="user-badge">Logged in as: -</div>

        <label for="secret-data">Your Encrypted Data</label>
        <textarea id="secret-data" placeholder="Type your secret data here..."></textarea>

        <div class="actions">
            <button class="btn-primary" onclick="handleSave()">
                <span id="save-text">Save</span>
                <span id="save-loading" class="hidden"><span class="spinner"></span>Saving...</span>
            </button>
            <button class="btn-secondary" onclick="handleReload()">Reload</button>
            <button class="btn-danger" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <!-- Status Display -->
    <div id="status" class="hidden"></div>

    <!-- Load BlindBase SDK -->
    <script src="js/blindbase-client.js"></script>

    <script>
        // Initialize BlindBase client
        const vault = new BlindBase('api.php');

        // Status display helper
        function showStatus(message, type = 'info') {
            const el = document.getElementById('status');
            el.textContent = message;
            el.className = `status status--${type}`;
            el.classList.remove('hidden');

            // Auto-hide success messages
            if (type === 'success') {
                setTimeout(() => el.classList.add('hidden'), 3000);
            }
        }

        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }

        // Login handler
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showStatus('Please enter both username and password.', 'warning');
                return;
            }

            const loginBtn = document.getElementById('login-btn');
            const loginText = document.getElementById('login-text');
            const loginLoading = document.getElementById('login-loading');

            loginBtn.disabled = true;
            loginText.classList.add('hidden');
            loginLoading.classList.remove('hidden');
            hideStatus();

            try {
                showStatus('Deriving encryption key (this may take a moment)...', 'info');

                const data = await vault.init(username, password);

                // Update UI
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('vault-screen').classList.remove('hidden');
                document.getElementById('user-badge').textContent = `Logged in as: ${vault.getUsername()}`;

                if (data) {
                    // Pretty-print if it's an object
                    const display = typeof data === 'object'
                        ? JSON.stringify(data, null, 2)
                        : data;
                    document.getElementById('secret-data').value = display;
                    showStatus('Vault unlocked. Data loaded successfully.', 'success');
                } else {
                    document.getElementById('secret-data').value = '';
                    document.getElementById('secret-data').placeholder = 'No existing data. Start typing to create new content.';
                    showStatus('Vault unlocked. No existing data found.', 'success');
                }
            } catch (error) {
                showStatus(`Login failed: ${error.message}`, 'error');
                loginBtn.disabled = false;
                loginText.classList.remove('hidden');
                loginLoading.classList.add('hidden');
            }
        }

        // Save handler
        async function handleSave() {
            const content = document.getElementById('secret-data').value;
            const saveText = document.getElementById('save-text');
            const saveLoading = document.getElementById('save-loading');

            saveText.classList.add('hidden');
            saveLoading.classList.remove('hidden');

            try {
                // Try to parse as JSON, otherwise save as raw string
                let dataToSave;
                try {
                    dataToSave = JSON.parse(content);
                } catch {
                    dataToSave = content;
                }

                const result = await vault.save(dataToSave);
                showStatus(`Saved successfully at ${result.updated_at}`, 'success');
            } catch (error) {
                showStatus(`Save failed: ${error.message}`, 'error');
            } finally {
                saveText.classList.remove('hidden');
                saveLoading.classList.add('hidden');
            }
        }

        // Reload data from server
        async function handleReload() {
            try {
                showStatus('Reloading data...', 'info');
                const data = await vault.load();

                if (data) {
                    const display = typeof data === 'object'
                        ? JSON.stringify(data, null, 2)
                        : data;
                    document.getElementById('secret-data').value = display;
                    showStatus('Data reloaded successfully.', 'success');
                } else {
                    document.getElementById('secret-data').value = '';
                    showStatus('No data found on server.', 'warning');
                }
            } catch (error) {
                showStatus(`Reload failed: ${error.message}`, 'error');
            }
        }

        // Logout handler
        function handleLogout() {
            if (confirm('Are you sure you want to logout? Make sure your data is saved.')) {
                vault.logout();
            }
        }

        // Handle Enter key on password field
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        // Focus username field on load
        document.getElementById('username').focus();
    </script>
</body>
</html>
